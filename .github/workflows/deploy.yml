          nullifier → <span style="color:var(--li);" id="p-null">—</span><br/>
          commitment→ <span style="color:var(--li);" id="p-com">—</span><br/>
          token &nbsp;&nbsp;&nbsp;&nbsp;→ <strong style="color:var(--pa);" id="p-tok">—</strong><br/>
          identity &nbsp;→ <span style="color:#639922;">✓ concealed</span>
        </div>
      </div>
      <p style="font-size:11px;color:var(--mi);letter-spacing:.06em;text-transform:uppercase;margin-bottom:9px;font-family:'IBM Plex Mono',monospace;">your solidarity badge</p>
      <div class="bc">
        <svg width="42" height="42" viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg">
          <circle cx="80" cy="80" r="80" fill="#085041"/>
          <ellipse cx="80" cy="80" rx="52" ry="32" fill="none" stroke="#5DCAA5" stroke-width="3"/>
          <ellipse cx="80" cy="80" rx="20" ry="20" fill="#1D9E75"/>
          <ellipse cx="80" cy="80" rx="10" ry="10" fill="#04342C"/>
          <ellipse cx="73" cy="74" rx="4" ry="4" fill="#9FE1CB" opacity=".7"/>
        </svg>
        <div class="bi">
          <div class="bn" id="b-name">—</div>
          <div class="bh" id="b-handle">—</div>
          <span class="bt" id="b-tag">building by builders · keepAIon.com</span>
        </div>
        <div class="qb"><svg id="qr-svg" width="58" height="58" viewBox="0 0 58 58" xmlns="http://www.w3.org/2000/svg"></svg></div>
      </div>
      <div class="ba">
        <button class="bsp" onclick="dlBadge()">download badge</button>
        <button class="bso" id="md-btn" onclick="cpMd()">copy README snippet</button>
      </div>
      <div class="cb" id="md-out"></div>
    </div>
  </div>
</section>

<!-- ── Δ9 SECTION ──────────────────────────────────────────────── -->
<section id="delta9-section" style="display:none; padding:5rem 1.5rem;">
  <div style="max-width:780px; margin:0 auto;">
    <p style="font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--mi); margin-bottom:.75rem;">Utility Token · Solana</p>
    <h2 style="font-size:clamp(36px,7vw,72px); font-weight:500; color:var(--pa); letter-spacing:-.03em; line-height:1; margin-bottom:1.25rem;">Δ<em style="font-style:normal; color:var(--li);">9</em></h2>
    <p style="font-size:16px; color:var(--li); line-height:1.75; max-width:560px; margin-bottom:2.5rem;">The utility token powering the entire Consent Stack. Hold Δ9 on Solana to keep your AMOK credential active, vote on ecosystem governance, and unlock premium 4DNFT artist features.</p>

    <div style="display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:1px; background:var(--mi); margin-bottom:2.5rem;">
