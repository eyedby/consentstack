    <div style="background:var(--bg2); border:.5px solid var(--mi); border-radius:12px; padding:2rem; max-width:480px;">
      <p style="font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--mi); letter-spacing:.08em; text-transform:uppercase; margin-bottom:1rem;">Connect your wallet</p>
      <p style="font-size:13px; color:var(--li); line-height:1.7; margin-bottom:1.5rem;">Δ9 is live on Solana. Connect your Phantom or Solflare wallet to check your balance and activate your AMOK credential.</p>
      <div style="display:flex; gap:10px; flex-wrap:wrap;">
        <a href="https://phantom.app" target="_blank" rel="noopener"
           style="display:inline-flex; align-items:center; gap:8px; background:var(--ac); color:#fff; border:none; border-radius:8px; padding:12px 20px; font-size:13px; font-weight:500; text-decoration:none;">
          <svg width="16" height="16" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="64" cy="64" r="64" fill="white" fill-opacity=".15"/><path d="M110 64c0 25.4-20.6 46-46 46S18 89.4 18 64s20.6-46 46-46 46 20.6 46 46z" fill="white" fill-opacity=".2"/></svg>
          Phantom wallet
