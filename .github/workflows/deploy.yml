name: Deploy to GoDaddy — The Consent Stack

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout eyedby/consentstack
        uses: actions/checkout@v4

      - name: Deploy via SSH to GoDaddy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.GODADDY_HOST }}
          username: ${{ secrets.GODADDY_USER }}
          key:      ${{ secrets.GODADDY_KEY }}
          port:     22
          script: |
            set -e
            cd ~/consentstack 2>/dev/null || git clone https://github.com/eyedby/consentstack.git ~/consentstack
            cd ~/consentstack
            git fetch origin main
            git reset --hard origin/main
            mkdir -p ~/public_html/keepaion.com/assets/img
            cp site/index.html      ~/public_html/keepaion.com/index.html
            cp site/whitepaper.html ~/public_html/keepaion.com/whitepaper.html
            [ -f site/badge.svg ]      && cp site/badge.svg      ~/public_html/keepaion.com/badge.svg
            [ -f site/amok-badge.svg ] && cp site/amok-badge.svg ~/public_html/keepaion.com/amok-badge.svg
            [ -f amok/frontend/js/amok-client.js ] && cp amok/frontend/js/amok-client.js ~/public_html/keepaion.com/assets/amok-client.js
            echo "consentstack $(date -u +%Y-%m-%dT%H:%M:%SZ) $(git rev-parse --short HEAD)" > ~/public_html/keepaion.com/version.txt
            echo "deployed"<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>aiOut — your consent. your right.</title>
  <meta name="description" content="You should never be subjected to an AI system without your explicit permission."/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body.theme-aiout    { --bg:#0C0C0C; --bg2:#1a0505; --bg3:#110303; --ac:#D85A30; --li:#F0997B; --pa:#FAECE7; --mi:#993C1D; --di:#4A1B0C; --nv:rgba(12,12,12,.93); }
    body.theme-keepaion { --bg:#020f0a; --bg2:#04342C; --bg3:#010a07; --ac:#1D9E75; --li:#5DCAA5; --pa:#9FE1CB; --mi:#0F6E56; --di:#04342C; --nv:rgba(2,15,10,.93); }
    body.theme-delta9   { --bg:#0D0A00; --bg2:#1a1200; --bg3:#090700; --ac:#B8860B; --li:#E8B830; --pa:#FFF3C4; --mi:#8B6914; --di:#412402; --nv:rgba(13,10,0,.93); }
    body.theme-4dnft    { --bg:#06020F; --bg2:#130A2A; --bg3:#080212; --ac:#8B5CF6; --li:#A78BFA; --pa:#EDE9FE; --mi:#5B21B6; --di:#2E1065; --nv:rgba(6,2,15,.93); }

    body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--pa); min-height:100vh; }

    /* NAV */
    nav { position:fixed; top:0; left:0; right:0; z-index:100; background:var(--nv); backdrop-filter:blur(14px); border-bottom:.5px solid var(--mi); height:56px; display:flex; align-items:center; justify-content:space-between; padding:0 1.5rem; }
    #nav-logo { font-size:18px; font-weight:500; color:var(--pa); letter-spacing:-.02em; text-decoration:none; }
    #nav-logo em { color:var(--li); font-style:normal; }
    .nl { display:flex; gap:1.25rem; align-items:center; }
    .nl a { font-size:12px; color:var(--li); text-decoration:none; }
    .nl a:hover { color:var(--pa); }
    .ncta { background:var(--ac)!important; color:#fff!important; border-radius:6px; padding:7px 16px; font-size:13px; font-weight:500; text-decoration:none; }
    @media(max-width:540px){.nl{display:none}}

    /* HERO */
    .hero { min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:7rem 1.5rem 4rem; position:relative; overflow:hidden; }
    .glow { position:absolute; top:40%; left:50%; transform:translate(-50%,-50%); width:600px; height:280px; background:radial-gradient(ellipse,var(--ac) 0%,transparent 70%); opacity:.07; pointer-events:none; }
    .pill { display:inline-block; font-size:11px; font-family:'IBM Plex Mono',monospace; background:var(--bg2); color:var(--li); border:.5px solid var(--mi); border-radius:20px; padding:3px 14px; margin-bottom:1.25rem; letter-spacing:.05em; }
    .hero h1 { font-size:clamp(48px,11vw,92px); font-weight:500; color:var(--pa); letter-spacing:-.03em; line-height:1; margin-bottom:1.1rem; }
    .hero h1 em { color:var(--li); font-style:normal; }
    .hero > p { font-size:clamp(14px,2vw,17px); color:var(--li); line-height:1.75; max-width:500px; margin:0 auto 2.25rem; }
    .hbtns { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; margin-bottom:2.75rem; }
    .bp { background:var(--ac); color:#fff; border:none; border-radius:8px; padding:13px 26px; font-size:15px; font-weight:500; cursor:pointer; font-family:'Inter',sans-serif; text-decoration:none; }
    .bp:hover { opacity:.88; }
    .bo { background:none; color:var(--li); border:.5px solid var(--mi); border-radius:8px; padding:12px 22px; font-size:15px; cursor:pointer; font-family:'Inter',sans-serif; text-decoration:none; }
    .bo:hover { border-color:var(--ac); color:var(--pa); }
    .stats { display:flex; gap:2.5rem; justify-content:center; flex-wrap:wrap; }
    .sn { font-size:30px; font-weight:500; color:var(--ac); }
    .sl { font-size:11px; color:var(--mi); letter-spacing:.04em; margin-top:2px; }

    /* ECO BAR */
    .eco { background:var(--bg2); border-top:.5px solid var(--mi); border-bottom:.5px solid var(--mi); display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); }
    .eco-item { padding:1.5rem 1rem; text-align:center; border-right:.5px solid var(--mi); cursor:pointer; transition:background .15s; }
    .eco-item:last-child { border-right:none; }
    .eco-item:hover, .eco-item.active { background:var(--bg3); }
    .eco-domain { font-size:16px; font-weight:500; color:var(--pa); margin-bottom:3px; }
    .eco-desc { font-size:11px; color:var(--li); line-height:1.5; }

    /* SECTIONS */
    section { padding:4.5rem 1.5rem; max-width:900px; margin:0 auto; }
    .sl2 { font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--mi); letter-spacing:.1em; text-transform:uppercase; margin-bottom:.75rem; }
    h2 { font-size:clamp(26px,5vw,42px); font-weight:500; color:var(--pa); letter-spacing:-.02em; margin-bottom:.9rem; line-height:1.1; }
    h2 em { color:var(--li); font-style:normal; }
    .sp { font-size:15px; color:var(--li); line-height:1.7; max-width:540px; }

    /* CARDS */
    .cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(195px,1fr)); gap:10px; margin-top:1.75rem; }
    .card { background:var(--bg2); border:.5px solid var(--mi); border-radius:12px; padding:1.35rem; }
    .cn { font-family:'IBM Plex Mono',monospace; font-size:10px; color:var(--ac); margin-bottom:.6rem; }
    .card h3 { font-size:14px; font-weight:500; color:var(--pa); margin-bottom:.4rem; }
    .card p { font-size:12px; color:var(--li); line-height:1.6; }

    /* PLEDGE */
    .pw { background:var(--bg2); border-radius:16px; padding:2.25rem 1.75rem; max-width:560px; margin:0 auto; }
    .pt { font-size:14px; color:var(--li); line-height:1.8; border-left:2px solid var(--ac); padding-left:1.1rem; margin-bottom:1.75rem; }
    .fg { margin-bottom:.9rem; }
    .fg label { display:block; font-size:10px; color:var(--mi); letter-spacing:.06em; text-transform:uppercase; margin-bottom:5px; font-family:'IBM Plex Mono',monospace; }
    .fg input { width:100%; padding:11px 13px; background:var(--bg3); border:.5px solid var(--mi); border-radius:8px; font-size:14px; color:var(--pa); font-family:'IBM Plex Mono',monospace; }
    .fg input:focus { outline:none; border-color:var(--ac); }
    .fg input::placeholder { color:var(--di); }
    .cr { display:flex; gap:9px; align-items:flex-start; margin-bottom:1.25rem; }
    .cr input[type=checkbox] { margin-top:3px; accent-color:var(--ac); width:16px; height:16px; flex-shrink:0; cursor:pointer; }
    .cr label { font-size:13px; color:var(--li); line-height:1.5; cursor:pointer; }
    .abar { display:flex; align-items:center; gap:9px; padding:10px 13px; background:var(--bg3); border:.5px solid var(--mi); border-radius:8px; margin-bottom:1.1rem; }
    .adot { width:8px; height:8px; border-radius:50%; background:var(--ac); flex-shrink:0; animation:blink 1.5s ease-in-out infinite; }
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
    .bfull { width:100%; background:var(--ac); color:#fff; border:none; border-radius:8px; padding:13px; font-size:15px; font-weight:500; cursor:pointer; font-family:'Inter',sans-serif; display:flex; align-items:center; justify-content:center; }
    .bfull:hover { opacity:.88; }
    .term { display:none; margin-top:.9rem; background:#010503; border:.5px solid var(--mi); border-radius:8px; padding:13px 15px; font-family:'IBM Plex Mono',monospace; font-size:12px; line-height:2.2; min-height:56px; }
    .br { display:none; margin-top:1.35rem; }
    .pc { background:var(--bg3); border:.5px solid var(--ac); border-radius:10px; padding:.9rem; margin-bottom:1.1rem; display:none; }
    .ph { display:flex; align-items:center; gap:8px; margin-bottom:9px; }
    .pl { font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--mi); line-height:2; }
    .bc { background:var(--bg3); border:.5px solid var(--ac); border-radius:12px; padding:1.1rem; display:flex; align-items:center; gap:1rem; }
    .bi { flex:1; min-width:0; }
    .bn { font-size:15px; font-weight:500; color:var(--pa); margin-bottom:2px; }
    .bh { font-size:12px; color:var(--li); font-family:'IBM Plex Mono',monospace; margin-bottom:7px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .bt { font-size:10px; background:var(--bg2); color:var(--li); border:.5px solid var(--mi); border-radius:20px; padding:2px 9px; display:inline-block; }
    .qb { background:#E1F5EE; border-radius:7px; padding:5px; width:68px; height:68px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .ba { display:flex; gap:8px; margin-top:.9rem; flex-wrap:wrap; }
    .bsp { font-size:12px; padding:7px 14px; border-radius:6px; cursor:pointer; font-family:'Inter',sans-serif; font-weight:500; background:var(--ac); color:#fff; border:none; }
    .bso { font-size:12px; padding:7px 14px; border-radius:6px; cursor:pointer; font-family:'Inter',sans-serif; background:none; color:var(--li); border:.5px solid var(--mi); }
    .cb { background:var(--bg3); border:.5px solid var(--mi); border-radius:8px; padding:10px 13px; margin-top:9px; font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--li); word-break:break-all; }

    /* FOOTER */
    footer { background:var(--bg2); border-top:.5px solid var(--mi); padding:1.75rem 1.5rem; text-align:center; font-size:12px; color:var(--mi); font-family:'IBM Plex Mono',monospace; }
    footer a { color:var(--li); text-decoration:none; }
    footer a:hover { color:var(--pa); }
  </style>
</head>
<body>

<nav>
  <a id="nav-logo" href="#">ai<em>Out</em></a>
  <div class="nl">
    <a href="#why">why</a>
    <a href="#pledge">pledge</a>
    <a href="https://keepaion.com" id="nl-k">keepAIon</a>
    <a href="#" onclick="switchEco('delta9'); return false;" id="nl-d9" style="color:var(--li);">Δ9</a>
    <a href="#" onclick="switchEco('4dnft'); return false;" id="nl-4d" style="color:var(--li);">4DNFT</a>
    <a href="/whitepaper.html" style="color:var(--mi);">whitepaper</a>
  </div>
  <a class="ncta" href="#pledge" id="nav-cta">join</a>
</nav>

<div class="hero">
  <div class="glow"></div>
  <div class="pill" id="hero-pill">a rights movement · aiout.me</div>
  <h1 id="hero-h1">ai<em>Out</em></h1>
  <p id="hero-p">You should never be subjected to an AI system without your explicit permission. We're building a legal record — one name at a time.</p>
  <div class="hbtns">
    <a class="bp" href="#pledge" id="hb1">add my name →</a>
    <a class="bo" href="#why"    id="hb2">learn more</a>
  </div>
  <div class="stats">
    <div class="stat"><div class="sn" id="counter">12,847</div><div class="sl" id="s1l">names added</div></div>
    <div class="stat"><div class="sn">38</div><div class="sl">countries</div></div>
    <div class="stat"><div class="sn">247</div><div class="sl" id="s3l">builders pledged</div></div>
  </div>
</div>

<div class="eco">
  <div class="eco-item active" id="eco-aiout"    onclick="switchEco('aiout')">    <div class="eco-domain">aiOut.me</div>    <div class="eco-desc">rights · consent · opt-out</div></div>
  <div class="eco-item"        id="eco-keepaion" onclick="switchEco('keepaion')"> <div class="eco-domain">keepAIon</div>     <div class="eco-desc">builders · AMOK · ZKP</div></div>
  <div class="eco-item"        id="eco-delta9"   onclick="switchEco('delta9')">   <div class="eco-domain">Δ9</div>           <div class="eco-desc">utility token · Solana</div></div>
  <div class="eco-item"        id="eco-4dnft"    onclick="switchEco('4dnft')">    <div class="eco-domain">4DNFT</div>        <div class="eco-desc">artist NFTs · plays · shares</div></div>
</div>

<section id="why">
  <p class="sl2">why it matters</p>
  <h2 id="why-h2">Four demands.<br><em>One movement.</em></h2>
  <p class="sp" id="why-p">Built on four non-negotiable principles — the foundation of a consent-first AI future.</p>
  <div class="cards" id="cards"></div>
</section>

<section id="pledge" style="padding-top:2rem;">
  <p class="sl2" style="text-align:center;">take the pledge</p>
  <h2 id="pledge-h2" style="text-align:center; margin-bottom:.5rem;">Sign.<br><em>Get your badge.</em></h2>
  <p class="sp" id="pledge-sub" style="text-align:center; margin:0 auto 2.25rem;">Connect your GitHub. AMOK generates a zero-knowledge proof. Identity concealed.</p>

  <div class="pw">
