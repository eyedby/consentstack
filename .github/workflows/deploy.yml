        <div style="font-family:'IBM Plex Mono',monospace; font-size:10px; color:var(--ac); margin-bottom:.5rem;">02 —</div>
        <div style="font-size:14px; font-weight:500; color:var(--pa); margin-bottom:.4rem;">Governance</div>
        <div style="font-size:12px; color:var(--li); line-height:1.6;">Vote on keepAIon pledge versions, aiOut legal strategy, and 4DNFT royalty parameters.</div>
      </div>
      <div style="background:var(--bg2); padding:1.5rem;">
        <div style="font-family:'IBM Plex Mono',monospace; font-size:10px; color:var(--ac); margin-bottom:.5rem;">03 —</div>
        <div style="font-size:14px; font-weight:500; color:var(--pa); margin-bottom:.4rem;">4DNFT unlock</div>
