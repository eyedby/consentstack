  <text x="88" y="65" font-family="monospace" font-size="12" fill="#5DCAA5">${gh}</text>
  <text x="88" y="88" font-family="Inter,sans-serif" font-size="11" fill="#0F6E56">${d.bt}</text>
  <g transform="translate(410,30)">${qr}</g>
</svg>`;
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([svg],{type:'image/svg+xml'}));
  a.download = (id && id!=='—' ? id : 'keepaion')+'-badge.svg';
  a.click();
}
