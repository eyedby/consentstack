    </div>
    <div class="cr"><input type="checkbox" id="agree" checked/><label for="agree" id="agree-lbl">I agree to the pledge and want to publicly signal my commitment.</label></div>
    <div class="abar">
      <div class="adot"></div>
      <span style="font-size:12px;color:var(--li);flex:1;">AMOK zero-knowledge proof — identity stays private</span>
      <label style="display:flex;align-items:center;gap:6px;cursor:pointer;">
        <input type="checkbox" id="amok-tog" checked style="accent-color:var(--ac);width:14px;height:14px;"/>
        <span style="font-size:11px;color:var(--mi);font-family:'IBM Plex Mono',monospace;">enabled</span>
      </label>
    </div>
    <button class="bfull" id="sign-btn" onclick="runPledge()">⚡ run AMOK &amp; sign →</button>
    <div class="term" id="term"></div>
    <div class="br" id="br">
      <div class="pc" id="pc">
        <div class="ph">
          <div class="adot"></div>
          <span style="font-size:12px;font-weight:500;color:var(--pa);">AMOK proof generated</span>
          <span style="font-size:10px;background:var(--bg2);color:var(--ac);border:.5px solid var(--mi);border-radius:20px;padding:2px 10px;margin-left:auto;">verified</span>
        </div>
        <div class="pl">
