    <div class="fg"><label>Your name</label><input type="text" id="name-inp" placeholder="Tim Sweeney"/></div>
    <div class="fg"><label>GitHub URL</label><input type="text" id="gh-inp" placeholder="github.com/yourusername"/></div>
    <div class="fg">
