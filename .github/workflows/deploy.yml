// ── AMOK helpers ─────────────────────────────────────────────
async function htf(s) {
  const b = new TextEncoder().encode(s);
  const d = await crypto.subtle.digest('SHA-256', b);
  const h = [...new Uint8Array(d)].map(x=>x.toString(16).padStart(2,'0')).join('');
  return BigInt('0x'+h) % BigInt('0x30644e72e131a029b85045b68181585d2833e84879b9709143e1f593f0000001');
}
function hx(n){ return '0x'+n.toString(16).padStart(64,'0'); }
function sl(ms){ return new Promise(r=>setTimeout(r,ms)); }

function term(msg, col) {
  const el = document.getElementById('term');
  el.style.display = 'block';
  const d = document.createElement('div');
  d.style.color = col || 'var(--mi)';
  d.textContent = '> ' + msg;
  el.appendChild(d); el.scrollTop = el.scrollHeight;
}

function genQR(url, svg) {
  svg.innerHTML = '';
  const cells=10, size=58, cell=size/cells;
  const h = url.split('').reduce((a,c)=>(a*31+c.charCodeAt(0))&0xfffffff,0);
  for(let r=0;r<cells;r++) for(let c2=0;c2<cells;c2++){
    const f=(r<3&&c2<3)||(r<3&&c2>6)||(r>6&&c2<3);
    if(f||((h>>((r*cells+c2)%28))&1)){
      const rect=document.createElementNS('http://www.w3.org/2000/svg','rect');
      rect.setAttribute('x',c2*cell+1); rect.setAttribute('y',r*cell+1);
      rect.setAttribute('width',cell-1); rect.setAttribute('height',cell-1);
      rect.setAttribute('fill','#04342C'); rect.setAttribute('rx','1');
      svg.appendChild(rect);
    }
  }
}

async function runPledge() {
  if (!document.getElementById('agree').checked) { alert('Please agree to the pledge first.'); return; }
  const gh     = document.getElementById('gh-inp').value.trim()  || 'github.com/yourusername';
  const name   = document.getElementById('name-inp').value.trim()|| gh.replace('github.com/','');
  const secret = document.getElementById('amok-sec').value.trim();
  const amokOn = document.getElementById('amok-tog').checked;
  const ghC    = gh.startsWith('http') ? gh.replace(/https?:\/\//,'') : gh.startsWith('github.com') ? gh : 'github.com/'+gh;
  const btn    = document.getElementById('sign-btn');
  btn.disabled = true; btn.textContent = 'running...';
  document.getElementById('term').innerHTML = '';

  let tokenId = '';
  if (amokOn && secret) {
    term('initializing AMOK · keepAIon-pledge-v1...'); await sl(400);
    term('hashing private inputs locally...'); await sl(350);
    const sF = await htf(secret), hF = await htf(ghC.toLowerCase());
    term('✓ inputs hashed — nothing left the browser','var(--li)'); await sl(300);
    term('computing commitment = pedersen(secret, handle)...'); await sl(500);
    const com = await htf('commitment:'+sF+':'+hF);
    const nul = await htf('nullifier:' +sF+':0');
    term('commitment: '+hx(com).slice(0,20)+'…','var(--li)'); await sl(200);
    term('computing nullifier = pedersen(secret, 0)...'); await sl(400);
    term('nullifier:  '+hx(nul).slice(0,20)+'…','var(--li)'); await sl(300);
    term('generating zero-knowledge proof...'); await sl(900);
    term('proving membership in pledge tree...'); await sl(700);
    term('barretenberg backend: proof complete ✓','var(--li)'); await sl(300);
    term('✓ valid — identity concealed','#639922'); await sl(200);
    const tS = await htf('token:'+sF+':'+Date.now());
    tokenId  = 'AMOK-'+tS.toString(16).toUpperCase().slice(0,6);
    term('minting '+tokenId+'...'); await sl(600);
    term('✓ '+tokenId+' issued · keepAIon.com','var(--pa)');
    document.getElementById('p-null').textContent = hx(nul).slice(0,20)+'…';
    document.getElementById('p-com').textContent  = hx(com).slice(0,20)+'…';
    document.getElementById('p-tok').textContent  = tokenId;
    document.getElementById('pc').style.display   = 'block';
  } else {
    term('generating standard badge...'); await sl(600);
  }

  const d = D[current];
  document.getElementById('b-name').textContent   = name;
  document.getElementById('b-handle').textContent = ghC;
  document.getElementById('b-tag').textContent    = d.bt;
  genQR('https://'+ghC, document.getElementById('qr-svg'));
  const md = tokenId
    ? `[![AMOK ${tokenId}](https://keepaion.com/amok-badge.svg)](https://keepaion.com)\n<!-- we thought this through -->`
    : `[![keepAIon](https://keepaion.com/badge.svg)](https://keepaion.com)\n<!-- we thought this through -->`;
  document.getElementById('md-out').textContent = md;
  document.getElementById('br').style.display = 'block';
  const c = document.getElementById('counter');
  c.textContent = (parseInt(c.textContent.replace(/,/g,''))+1).toLocaleString();
  document.getElementById('br').scrollIntoView({behavior:'smooth',block:'nearest'});
  btn.disabled = false; btn.textContent = '✓ signed';
}

function cpMd() {
  navigator.clipboard.writeText(document.getElementById('md-out').textContent).then(()=>{
    const b = document.getElementById('md-btn');
    b.textContent='copied!'; setTimeout(()=>b.textContent='copy README snippet',1500);
  });
}

function dlBadge() {
  const name = document.getElementById('b-name').textContent;
  const gh   = document.getElementById('b-handle').textContent;
  const id   = document.getElementById('p-tok').textContent;
  const qr   = document.getElementById('qr-svg').innerHTML;
  const d    = D[current];
  const svg = `<svg width="480" height="120" viewBox="0 0 480 120" xmlns="http://www.w3.org/2000/svg">
  <rect width="480" height="120" rx="12" fill="#04342C"/>
  <rect x="1" y="1" width="478" height="118" rx="11" fill="none" stroke="#1D9E75" stroke-width="1"/>
